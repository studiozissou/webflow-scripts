<!--
  MAKES TEMPLATE — JSON-LD Schema
  Paste into head custom code on the Makes CMS template page.
  Uses Webflow CMS binding syntax with &quot; entities and : for ref sub-fields.
  Makes FAQ slugs: faq (1), faq-2, faq-3 ... faq-10
-->

<!-- WebPage + BreadcrumbList — always present -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@graph": [
    {
      "@type": "CollectionPage",
      "@id": "https://www.carsa.co.uk/used-cars/make/{{wf {&quot;path&quot;:&quot;slug&quot;,&quot;type&quot;:&quot;PlainText&quot;\} }}#webpage",
      "url": "https://www.carsa.co.uk/used-cars/make/{{wf {&quot;path&quot;:&quot;slug&quot;,&quot;type&quot;:&quot;PlainText&quot;\} }}",
      "name": "Used {{wf {&quot;path&quot;:&quot;name&quot;,&quot;type&quot;:&quot;PlainText&quot;\} }} Cars for Sale | Carsa",
      "description": "{{wf {&quot;path&quot;:&quot;subheading&quot;,&quot;type&quot;:&quot;PlainText&quot;\} }}",
      "isPartOf": { "@id": "https://www.carsa.co.uk/#website" },
      "publisher": { "@id": "https://www.carsa.co.uk/#organization" },
      "breadcrumb": { "@id": "https://www.carsa.co.uk/used-cars/make/{{wf {&quot;path&quot;:&quot;slug&quot;,&quot;type&quot;:&quot;PlainText&quot;\} }}#breadcrumb" },
      "speakable": {
        "@type": "SpeakableSpecification",
        "cssSelector": [".section_hero h1", ".section_hero p"]
      },
      "mainEntity": { "@id": "https://www.carsa.co.uk/used-cars/make/{{wf {&quot;path&quot;:&quot;slug&quot;,&quot;type&quot;:&quot;PlainText&quot;\} }}#faq" }
    },
    {
      "@type": "BreadcrumbList",
      "@id": "https://www.carsa.co.uk/used-cars/make/{{wf {&quot;path&quot;:&quot;slug&quot;,&quot;type&quot;:&quot;PlainText&quot;\} }}#breadcrumb",
      "itemListElement": [
        {
          "@type": "ListItem",
          "position": 1,
          "name": "Home",
          "item": "https://www.carsa.co.uk/"
        },
        {
          "@type": "ListItem",
          "position": 2,
          "name": "Used Cars",
          "item": "https://www.carsa.co.uk/used-cars"
        },
        {
          "@type": "ListItem",
          "position": 3,
          "name": "{{wf {&quot;path&quot;:&quot;name&quot;,&quot;type&quot;:&quot;PlainText&quot;\} }}"
        }
      ]
    }
  ]
}
</script>
