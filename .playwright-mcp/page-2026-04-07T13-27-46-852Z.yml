                  - generic [ref=e133]: Do I need to cancel my direct debits for road tax or insurance?
                  - img [ref=e136]
                - paragraph [ref=e140]: Yes. Once the sale is complete contact your insurance company to cancel your policy. The DVLA will automatically cancel your road tax and refund any full months remaining. Cancel any direct debits to avoid being charged again though you should wait until you have received your tax refund first.
            - listitem [ref=e141]:
              - generic [ref=e142]:
                - generic [ref=e143] [cursor=pointer]:
                  - generic [ref=e144]: How long is my guaranteed valuation valid for?
                  - img [ref=e147]
                - paragraph [ref=e151]: Your guaranteed valuation is valid for 7 days from the date it is issued provided the vehicles condition and details remain as described.
            - listitem [ref=e152]:
              - generic [ref=e153]:
                - generic [ref=e154] [cursor=pointer]:
                  - generic [ref=e155]: What happens after I accept your offer?
                  - img [ref=e158]
                - paragraph [ref=e162]: Once you accept our guaranteed valuation you will be able to select your preferred handover appointment time. You will receive a confirmation email with details of what to bring and what to expect on the day.
            - listitem [ref=e163]:
              - generic [ref=e164]:
                - generic [ref=e165] [cursor=pointer]:
                  - generic [ref=e166]: What happens at my appointment?
                  - img [ref=e169]
                - paragraph [ref=e173]: The process typically takes 30-45 minutes. We will inspect your vehicle verify your ID via YOTI then complete the paperwork and payment if you are happy to proceed.
            - listitem [ref=e174]:
              - generic [ref=e175]:
                - generic [ref=e176] [cursor=pointer]:
                  - generic [ref=e177]: What is my instant valuation based on?
                  - img [ref=e180]
                - paragraph [ref=e184]: Your instant valuation assumes your vehicle is in good condition with no mechanical issues has a full service history, no modifications and no missing items (keys manuals parcel shelf etc.). Your final valuation may be higher or lower depending on what we find at inspection.
            - listitem [ref=e185]:
              - generic [ref=e186]:
                - generic [ref=e187] [cursor=pointer]:
                  - generic [ref=e188]: What if I only have one key for my vehicle?
                  - img [ref=e191]
                - paragraph [ref=e195]: We can still purchase your vehicle with one key though having both keys and any spare fobs does help maximize your valuation. Please bring all keys you have available to your appointment.
            - listitem [ref=e196]:
              - generic [ref=e197]:
                - generic [ref=e198] [cursor=pointer]:
                  - generic [ref=e199]: Can I sell a vehicle with outstanding parking fines or penalties?
                  - img [ref=e202]
                - paragraph [ref=e206]: Any outstanding fines or penalties remain the responsibility of the registered keeper. We recommend settling these before your appointment to avoid any complications with the DVLA during the ownership transfer.
            - listitem [ref=e207]:
