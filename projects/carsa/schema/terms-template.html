<!--
  TERMS TEMPLATE — JSON-LD Schema
  Paste into: Terms CMS Collection Template → Page Settings → Custom Code → Head Code
  Uses Webflow CMS binding syntax with &quot; entities.
  CMS fields: slug, name
-->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@graph": [
    {
      "@type": "WebPage",
      "@id": "https://www.carsa.co.uk/terms/{{wf {&quot;path&quot;:&quot;slug&quot;,&quot;type&quot;:&quot;PlainText&quot;\} }}#webpage",
      "url": "https://www.carsa.co.uk/terms/{{wf {&quot;path&quot;:&quot;slug&quot;,&quot;type&quot;:&quot;PlainText&quot;\} }}",
      "name": "{{wf {&quot;path&quot;:&quot;name&quot;,&quot;type&quot;:&quot;PlainText&quot;\} }} | Carsa",
      "isPartOf": { "@id": "https://www.carsa.co.uk/#website" }
    },
    {
      "@type": "BreadcrumbList",
      "@id": "https://www.carsa.co.uk/terms/{{wf {&quot;path&quot;:&quot;slug&quot;,&quot;type&quot;:&quot;PlainText&quot;\} }}#breadcrumb",
      "itemListElement": [
        {
          "@type": "ListItem",
          "position": 1,
          "name": "Home",
          "item": "https://www.carsa.co.uk/"
        },
        {
          "@type": "ListItem",
          "position": 2,
          "name": "{{wf {&quot;path&quot;:&quot;name&quot;,&quot;type&quot;:&quot;PlainText&quot;\} }}"
        }
      ]
    }
  ]
}
</script>
