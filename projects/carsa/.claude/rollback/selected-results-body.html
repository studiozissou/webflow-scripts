<script>
    (() => {
      const form = document.getElementById('wf-form-Filter-Vehicles');
      if (!form) {
        console.warn('[fs-toggle] form not found');
        return;
      }
    
      const mobileSubmit = document.getElementById('mobile-search-submit');
      const mobileFilterButton = document.getElementById('mobile-filters-link');    
  
      // Detecting if it's mobile, and then setting the filter mode to submit or input
      const isMobile = () => window.matchMedia('(max-width: 991px)').matches;
      
      // Make isMobile globally accessible
      window.isMobile = isMobile;

      const mq = window.matchMedia('(max-width: 991px)');
    // TODO - duplication of isMobile & mq

      const updateFilterOn = () => {
        const mode = mq.matches ? 'submit' : 'input';
        form.setAttribute('fs-list-filteron', mode);
      };
      updateFilterOn();
      
      // Listening to media query change
      // TODO - this doesn't seem to work
      if (typeof mq.addEventListener === 'function') {
        mq.addEventListener('change', updateFilterOn);
      } else if (typeof mq.addListener === 'function') {
        mq.addListener(updateFilterOn);
      }
    
      // Show or hide loading state - used for desktop only it seems
      const showLoadingUI = () => {
        $('.loading').show();
        $('#results-list-wrapper').hide();
        $('.facet-wrapper').addClass('is-hidden');
        $('.filters1_item').addClass('is-loading');
      };

      const hideLoadingUI = () => {
        $('.loading').hide();
        $('#results-list-wrapper').show();
        $('.facet-wrapper').removeClass('is-hidden');
        $('.filters1_item').removeClass('is-loading'); 
      };
    
      // Only show loader on input/change if desktop (instant filtering)
      // TODO test removing on dekstop only logic this - because hideLoading UI from line 86 is desktop or mobile whereas this is just mobile
      $(document).on('input change', '[fs-list-field]', () => {
        if (!isMobile()) {
          showLoadingUI();
        }
      });
    
      // Mobile submit behavior
      if (mobileSubmit) {
        mobileSubmit.setAttribute('type', 'submit');
        mobileSubmit.addEventListener('click', (e) => {
          $('#mobile-loading-button').show();
          mobileSubmit.style.display = 'none';
        });
      }
      
      // Mobile filter open behaviour
      if (mobileFilterButton) {
          mobileFilterButton.addEventListener('click', (e) => {
            $('#mobile-loading-button').hide();
            mobileSubmit.style.display = "";
        });
      }
    
      // Finsweet list hooks for consistent loader hide/show and backup
      window.FinsweetAttributes = window.FinsweetAttributes || [];
      window.FinsweetAttributes.push([
        'list',
        (instances) => {
          const carList = instances.find(({ instance }) => instance === 'cars');
          if (!carList) return;
          carList.addHook('afterRender', hideLoadingUI);
          $(document).on('input change', '[fs-list-field]', () => {
          // logic around mobile being duplicated
            if (!window.matchMedia('(max-width: 991px)').matches) {
            showLoadingUI()
          }
        });
        carList.addHook('filter', () => {
            showLoadingUI();
        });
        }
      ]);

    })();
    </script>
    
    
    <!-- Make/Model selection -->
    <script>
      window.FinsweetAttributes = window.FinsweetAttributes || [];
      window.FinsweetAttributes.push([
        'list',
        (listInstances) => {
        // TODO - LIMIT TO MODELS LIST ONLY
          const modelList = listInstances.find(({ instance }) => instance === 'models');
          if (!modelList) return;
          initMakeModelFilters();
          // On any render - call the function
          modelList.addHook('render', () => {
            initMakeModelFilters();
          });
        }
      ]);
    
      function initMakeModelFilters() {
        // Get an element on the page that has each model/make 
        const items = $('.model-data').map(function () {
          return {
            model: $(this).attr('model-title'),
            make: $(this).attr('make-title')
          };
        }).get();
        // Get the make + model, if none found return
        const $makeDropdown = $('[name="make"]');
        const $modelDropdown = $('[name="model"]');
        if (!$makeDropdown.length || !$modelDropdown.length) return;

        //This removes change event handlers and sets the values. Makes models disabled\
        //TODO - if we have make / model in query params set here, remove duplication from later
        // Logic should be: If query params set that. If not set to any. 
        $makeDropdown.off('change').html('<option value="" selected>Any</option>');
        $modelDropdown.off('change').html('<option value="">Any</option>')
          .prop('disabled', true)
          .addClass('is-disabled');
    
        // Goes through all the list of models, gets the makes, uniques them.
        const uniqueMakes = [...new Set(items.map(i => i.make))].sort();
        uniqueMakes.forEach(make => {
          $makeDropdown.append(`<option value="${make}">${make}</option>`);
        });
    
        // Function to set dropdowns from URL parameters
        function setDropdownsFromURL() {
          const urlParams = new URLSearchParams(window.location.search);
          const makeParam = urlParams.get('e11aebe3_make_equal');
          const modelParam = urlParams.get('e11aebe3_model_equal');
          
          if (makeParam) {
            $makeDropdown.val(makeParam);
            $makeDropdown[0].dispatchEvent(new Event('change', { bubbles: true }));
            
            // Populate model dropdown for the selected make
            const filtered = items.filter(i => i.make === makeParam);
            if (filtered.length) {
              $modelDropdown.html('<option value="">Any</option>')
                .prop('disabled', false)
                .removeClass('is-disabled');
              filtered.forEach(i =>
                $modelDropdown.append(`<option value="${i.model}">${i.model}</option>`)
              );
              
              // Set the model value if it exists
              if (modelParam) {
                $modelDropdown.val(modelParam);
                $modelDropdown[0].dispatchEvent(new Event('change', { bubbles: true }));
              }
            }
          }
        }
        
        // Set dropdowns from URL on page load
        setDropdownsFromURL();
        
        $makeDropdown.on('change', function () {
          const selectedMake = this.value;
          const filtered = items.filter(i => i.make === selectedMake);
          // Clear only the model filter when make changes
          const tagRemoveButtons = document.querySelectorAll('[fs-list-element="tag-remove"]');
          
          // Get all the tag remove buttons, go up the chain to the tag, and if the tag value matches, click it
          tagRemoveButtons.forEach((button) => {
            const tagElement = button.closest('[fs-list-element="tag"]');
            if (tagElement) {
              const tagValue = tagElement.querySelector('[fs-list-element="tag-value"]');
              if (tagValue) {
                const value = tagValue.textContent.trim();
                
                // Check if this tag value exists in the model dropdown options
                const isModelTag = $modelDropdown.find(`option[value="${value}"]`).length > 0;
                if (isModelTag) {
                  if (!isMobile()) {
                    button.click();
                  }
                }
              }
            }
          });
          
          // Clear the field value as backup
          $modelDropdown.val('').trigger('input').trigger('change');
          
          // if no make selected, make model dropdown not clickable
          if (!filtered.length) {
            $modelDropdown.html('<option value="">Any</option>')
              .prop('disabled', true)
              .addClass('is-disabled');
            return;
          }
          // if make selected, prepopulate model dropdown with models
          // TODO - create a function to prepopulate models field. Is used twice
          $modelDropdown.html('<option value="">Any</option>')
            .prop('disabled', false)
            .removeClass('is-disabled');
          filtered.forEach(i =>
            $modelDropdown.append(`<option value="${i.model}">${i.model}</option>`)
          );
        });
    
        $modelDropdown.on('change', function () {
          // placeholder, if needed later
        });
      }
    </script>
       
    <!-- Show toast message if user is redirected from VDP 404 -->
    <script>
      $(function() {
        if (sessionStorage.getItem('from404Used') === 'true') {
          $('#redirect-message').show();
          sessionStorage.removeItem('from404Used');
        }
      });
    </script>
   
<script>
function windowLoaded() {
    const span = document.getElementById('desktop-results');    

    function getCount(el) {
      // Try to parse its numeric content (e.g. "1,234" → 1234)
      const raw = el.textContent.trim().replace(/,/g, '');
      const count = parseInt(raw, 10);
      return count;
    }

    let startValue = getCount(span);
    let i = 0;

    // Poll every 300 ms
    const pollId = setInterval(() => {
      const c = getCount(span);
      if(c == startValue) {
        i++;

        if(i >= 10) {
          // If we haven't changed in 3 seconds, stop polling
          clearInterval(pollId);
					$('#mobile-filters-loading-link').hide();
					$('#mobile-filters-link').css('display','flex');
        }
      }
      else if(c != startValue) {
        startValue = c;
        i = 0;
      }
    }, 400);

}

window.addEventListener("load", windowLoaded);
</script>
