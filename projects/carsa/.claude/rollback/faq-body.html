<!-- Open specific FAQ if it has been opened from a URL -->
<script>
$(function(){
  const params = new URLSearchParams(window.location.search);
  const slug = params.get('question_contain');
  if(slug){
    // delay 0.5s then click
    setTimeout(()=>{ document.querySelector('#'+slug)?.click(); },1000);
  }
});
</script>

<!-- Build schema for FAQs -->
<script>
(function () {
  if (window.__FAQ_SCHEMA_INIT__) return;
  window.__FAQ_SCHEMA_INIT__ = true;

  const SCOPE_SEL = '#faq-schema-list'; // hidden "Render All" list
  const ITEM_SEL  = '[data-faq-question]';
  const STABLE_MS = 1000;   // time the count must stay unchanged
  const TIMEOUT_MS = 15000; // hard stop (15s)
  const POLL_MS = 150;      // check frequency

  const norm = s => (s || '').replace(/\s+/g, ' ').trim();

  function collectFaq(scope) {
    const items = [];
    scope.querySelectorAll(ITEM_SEL).forEach(qEl => {
      const item = qEl.closest('[data-faq-item]');
      const aEl = item ? item.querySelector('[data-faq-answer]') : null;
      const q = norm(qEl.textContent);
      const a = norm(aEl ? aEl.textContent : '');
      if (!q || !a) return;
      items.push({
        "@type": "Question",
        "name": q,
        "acceptedAnswer": { "@type": "Answer", "text": a }
      });
    });
    return items;
  }

  function injectOnce(obj) {
    if (document.querySelector('script[data-faq-jsonld]')) return true;
    const s = document.createElement('script');
    s.type = 'application/ld+json';
    s.dataset.faqJsonld = '1';
    s.text = JSON.stringify(obj);
    document.head.appendChild(s);
    return true;
  }

  function waitForStableCount(scope, onDone) {
    let lastCount = -1;
    let lastChangeTs = performance.now();
    const startTs = performance.now();

    const timer = setInterval(() => {
      const count = scope.querySelectorAll(ITEM_SEL).length;
      if (count !== lastCount) {
        lastCount = count;
        lastChangeTs = performance.now();
      }
      const stableFor = performance.now() - lastChangeTs;
      const elapsed = performance.now() - startTs;
      if ((count > 0 && stableFor >= STABLE_MS) || elapsed >= TIMEOUT_MS) {
        clearInterval(timer);
        if (elapsed >= TIMEOUT_MS && count === 0) return;
        onDone(count);
      }
    }, POLL_MS);
  }

  function run() {
    const scope = document.querySelector(SCOPE_SEL);
    if (!scope) return waitForStableCount(document, build);
    waitForStableCount(scope, build);
  }

  function build() {
    const scope = document.querySelector(SCOPE_SEL) || document;
    const items = collectFaq(scope);
    if (!items.length) return;
    const jsonLd = { "@context": "https://schema.org", "@type": "FAQPage", "mainEntity": items };
    injectOnce(jsonLd);
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', run, { once: true });
  } else {
    run();
  }
})();
</script>

<!-- SVG Animations -->
<!-- Draw lines -->
<script>
// Unified GSAP "draw-line" (single or multiple paths)
// Applies ONLY to wrappers: [data-svg="draw-line"]
// Options: data-svg-start="auto|scroll" (default: auto), data-svg-duration="2" (seconds)

$(function () {
  if (typeof gsap === "undefined") return;
  if (typeof ScrollTrigger !== "undefined") gsap.registerPlugin(ScrollTrigger);

  // Track the first user scroll (used when start=scroll AND element is already past on load)
  let userHasScrolled = false;
  window.addEventListener('scroll', function onFirstScroll(){
    userHasScrolled = true;
    window.removeEventListener('scroll', onFirstScroll);
  }, { passive: true });

  // Target ONLY draw-line wrappers
  const wrappers = Array.from(new Set($('[data-svg="draw-line"]').get()));
  wrappers.forEach(function(wrapper){
    const $w = $(wrapper);
    if ($w.data('svgDrawInit')) return; // prevent double init per wrapper
    $w.data('svgDrawInit', true);

    // Per-wrapper config
    const startMode = (wrapper.getAttribute('data-svg-start') || 'auto').toLowerCase(); // 'auto' | 'scroll'
    const totalDur  = Math.max(0.001, parseFloat(wrapper.getAttribute('data-svg-duration')) || 2); // default 2s

    // All descendant SVGs
    const svgs = Array.from(wrapper.querySelectorAll('svg'));
    if (!svgs.length) return;

    svgs.forEach(function(svg){
      // Collect stroked shapes (works for 1 or many)
      const els = Array.from(svg.querySelectorAll('path,line,polyline,polygon,circle,ellipse,rect')).filter(function(el){
        const cs = getComputedStyle(el);
        return cs.stroke && cs.stroke !== 'none' && parseFloat(cs.strokeWidth) > 0;
      });
      if (!els.length) return;

      // Prime dashes + measure lengths (for proportional timing)
      let totalLen = 0;
      els.forEach(function(el){
        let len = 0;
        try { len = (typeof el.getTotalLength === 'function') ? el.getTotalLength() : 0; } catch(e){ len = 0; }
        if (!isFinite(len) || len <= 0) {
          const b = el.getBBox?.();
          len = (b && isFinite(b.width) && isFinite(b.height)) ? 2*(b.width + b.height) : 1000;
        }
        el.style.strokeDasharray = `${len} ${len}`;
        el.style.strokeDashoffset = `${len}`;
        el.__svgDrawLen = len;
        totalLen += len;
      });
      if (totalLen <= 0) totalLen = els.length || 1;

      // Build linear child timeline (each path sequential, duration proportional to length)
      const tl = gsap.timeline({ paused: true });
      els.forEach(function(el){
        const seg = (el.__svgDrawLen / totalLen) * totalDur; // seconds
        tl.to(el, { strokeDashoffset: 0, duration: seg, ease: "none" }, ">");
      });

      // Driver tween sets overall duration + smooth in/out
      const driver = gsap.to(tl, { progress: 1, duration: totalDur, ease: "power1.inOut", paused: true });

      // Helpers
      const playNow = () => gsap.delayedCall(0.2, () => driver.play()); // +200ms
      const playAfterFirstScroll = () => {
        if (userHasScrolled) playNow();
        else {
          const handler = () => { window.removeEventListener('scroll', handler); userHasScrolled = true; playNow(); };
          window.addEventListener('scroll', handler, { passive: true });
        }
      };

      // 20% viewport threshold ≈ "top 80%"
      const vh = window.innerHeight || document.documentElement.clientHeight;
      const r0 = svg.getBoundingClientRect();
      const pastOnLoad = (r0.top <= vh * 0.8 && r0.bottom >= 0);

      // IMPORTANT FIX: if already past on load, DO NOT create ScrollTrigger — decide immediately.
      if (pastOnLoad) {
        (startMode === 'scroll') ? playAfterFirstScroll() : playNow();
        return;
      }

      // Otherwise, normal trigger behavior
      if (typeof ScrollTrigger !== "undefined") {
        ScrollTrigger.create({
          trigger: svg,
          start: "top 80%",
          once: true,
          onEnter: () => playNow()
        });
      } else {
        // Fallback without ScrollTrigger
        const onScroll = () => {
          const r = svg.getBoundingClientRect();
          const enters = r.top <= vh * 0.8 && r.bottom >= 0;
          if (!enters) return;
          window.removeEventListener('scroll', onScroll);
          window.removeEventListener('resize', onScroll);
          playNow();
        };
        window.addEventListener('scroll', onScroll, { passive: true });
        window.addEventListener('resize', onScroll);
        onScroll(); // initial check
      }
    });
  });
});
</script>
